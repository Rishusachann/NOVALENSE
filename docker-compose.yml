version: '3.9'
services:
  backend:
    build: .
    container_name: novalense-backend
    ports:
      - "8000:8000"
  frontend:
    image: python:3.11-slim
    container_name: novalense-frontend
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - NOVALENSE_BACKEND_URL=http://backend:8000
    command: bash -lc "pip install --no-cache-dir -r requirements.txt && streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - backend
